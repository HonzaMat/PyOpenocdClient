name: Unit tests
on:
  push:
  schedule:
    - cron: '42 20 * * 2,4,6'
jobs:
  Run_unit_tests_ubuntu_22_04_py38_and_newer:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out the repository code
        uses: actions/checkout@v4
      - name: Install python interpreters
        run: |
          sudo apt-get update
          sudo add-apt-repository ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install   \
            python3.8            \
            python3.8-distutils  \
            python3.9            \
            python3.9-distutils  \
            python3.11           \
            python3.11-distutils \
            python3.12           \
            python3.13           \
            python3.14
      - name: Install nox
        run: |
          python3 -m pip install --user nox
      - name: Run unit tests
        run: |
          nox -s tests_unit

  Run_unit_tests_ubuntu_22_04_py37:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out the repository code
        uses: actions/checkout@v4
      - name: Install python interpreter
        run: |
          sudo apt-get update
          sudo add-apt-repository ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install   \
            python3.7            \
            python3.7-distutils
      - name: Install PIP version that still supports Python 3.7
        run: |
          python3.7 -m pip install --user pip==23.3.2
      - name: Install pytest
        run: |
          python3.7 -m pip install pytest
      - name: Run unit testing (on legacy Python 3.7)
        run: |
          python3.7 -m pip install .
          python3.7 -m pytest tests_unit/ -vv
  Run_unit_tests_windows_2022:
    runs-on: windows-2022
    steps:
      - name: Check out the repository code
        uses: actions/checkout@v4
      - name: Run unit tests
        run: |
          python3 --version
          python3 -m pip install --user nox
          python3 -m nox -s tests_unit-3.10 tests_unit-3.11 tests_unit-3.12 tests_unit-3.13 tests_unit-3.14

  Check_coverage:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out the repository code
        uses: actions/checkout@v4
      - name: Run unit tests with coverage check (single python version)
        run: |
          python3 --version
          python3 -m pip install --user nox
          nox -s tests_unit_coverage
      - name: Store coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/**